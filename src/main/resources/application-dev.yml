spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/toilet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

server:
  address: 0.0.0.0
  port: 8080

jwt:
  secret: my-super-secret-key-which-is-at-least-32-bytes-long
  expiration-ms: 900000

webauthn:
  rp-id: computer-theme-rounds-engagement.trycloudflare.com
  origin: https://computer-theme-rounds-engagement.trycloudflare.com

app:
  allowed-origin: "*"
  upload-dir: uploads

minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket: toilet-photos
