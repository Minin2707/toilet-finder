spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/toilet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: 8080

jwt:
    secret: my-super-secret-key-which-is-at-least-32-bytes-long
    expiration-ms: 86400000

webauthn:
    rp-id: frontpage-deployment-webcast-plain.trycloudflare.com
    origin: https://frontpage-deployment-webcast-plain.trycloudflare.com

app:
    allowed-origin: "*"

