spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/toilet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

    servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB

server:
  address: 0.0.0.0
  port: 8080

jwt:
    secret: my-super-secret-key-which-is-at-least-32-bytes-long
    expiration-ms: 86400000

webauthn:
    rp-id: caution-nationally-morgan-journalism.trycloudflare.com
    origin: https://caution-nationally-morgan-journalism.trycloudflare.com

app:
    allowed-origin: "*"
    upload-dir: uploads

minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket: toilet-photos

