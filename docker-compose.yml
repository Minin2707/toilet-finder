version: '3.8'

services:

  postgres:

    image: postgis/postgis:16-3.4

    container_name: toilet-db

    environment:
      POSTGRES_DB: toilet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"


  minio:

    image: minio/minio

    container_name: toilet-minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data


volumes:
  minio_data: